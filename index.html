<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIC Frames</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Malayalam Font (optional replace Inter if needed) -->
  <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Anek Malayalam', sans-serif; }
    #canvasWrapper { touch-action: none; cursor: grab; }
    #canvasWrapper:active { cursor: grabbing; }
  </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

<!-- HEADER -->
<header class="bg-white px-4 py-3 border-b flex justify-between">
  <h1 class="font-bold">MIC Frames</h1>
</header>

<!-- CANVAS -->
<div id="canvasWrapper" class="flex-grow flex items-center justify-center bg-gray-200">
  <canvas id="canvas"></canvas>
</div>

<!-- CONTROLS -->
<div class="bg-white p-4 space-y-3">

  <input type="file" id="imageInput" class="w-full">

  <input type="text" id="nameInput" placeholder="Enter name"
    class="w-full border p-2 text-center">

  <input type="range" id="zoomRange" min="0.1" max="3" step="0.05" value="1">

  <input type="range" id="posRange" min="200" max="1800" value="1500">

  <button id="downloadBtn" class="w-full bg-black text-white py-2">
    Download
  </button>

</div>

<script>
// --- SETTINGS ---
const SETTINGS = {
  width: 1080,
  height: 1950
};

// --- FRAME ---
const frame = new Image();
frame.src = "frame.png"; // MUST exist in repo

// --- STATE ---
let state = {
  img: null,
  x: 0,
  y: 0,
  scale: 1,
  text: '',
  textY: 1500
};

// --- CANVAS ---
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = SETTINGS.width;
canvas.height = SETTINGS.height;

// --- DRAW ---
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // IMAGE
  if(state.img){
    ctx.save();
    ctx.translate(canvas.width/2 + state.x, canvas.height/2 + state.y);
    ctx.scale(state.scale, state.scale);
    ctx.drawImage(state.img, -state.img.width/2, -state.img.height/2);
    ctx.restore();
  }

  // FRAME
  if(frame.complete){
    ctx.drawImage(frame,0,0,canvas.width,canvas.height);
  }

  // TEXT
  if(state.text){
    ctx.save();
    ctx.textAlign="center";

    // auto fit
    let size=90;
    do{
      ctx.font = `800 ${size}px 'Anek Malayalam'`;
      size--;
    }while(ctx.measureText(state.text).width > 900 && size>30);

    ctx.fillStyle="#fff";
    ctx.strokeStyle="rgba(0,0,0,0.8)";
    ctx.lineWidth=4;

    ctx.shadowColor="rgba(0,0,0,0.7)";
    ctx.shadowBlur=15;
    ctx.shadowOffsetY=5;

    ctx.strokeText(state.text, canvas.width/2, state.textY);
    ctx.fillText(state.text, canvas.width/2, state.textY);

    ctx.restore();
  }
}

// --- IMAGE UPLOAD ---
document.getElementById('imageInput').addEventListener('change', e=>{
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      state.img=img;

      // auto fit
      state.scale = canvas.width / img.width;
      state.x=0;
      state.y=0;

      draw();
    }
    img.src=ev.target.result;
  }
  reader.readAsDataURL(file);
});

// --- ZOOM ---
document.getElementById('zoomRange').addEventListener('input',e=>{
  state.scale=parseFloat(e.target.value);
  draw();
});

// --- TEXT ---
document.getElementById('nameInput').addEventListener('input',e=>{
  state.text=e.target.value;
  draw();
});

// --- TEXT POSITION ---
document.getElementById('posRange').addEventListener('input',e=>{
  state.textY=parseInt(e.target.value);
  draw();
});

// --- DRAG ---
let dragging=false,startX,startY;

canvas.addEventListener('mousedown',e=>{
  dragging=true;
  startX=e.clientX;
  startY=e.clientY;
});

window.addEventListener('mousemove',e=>{
  if(!dragging) return;

  state.x += (e.clientX-startX);
  state.y += (e.clientY-startY);

  startX=e.clientX;
  startY=e.clientY;

  draw();
});

window.addEventListener('mouseup',()=>dragging=false);

// --- DOWNLOAD ---
document.getElementById('downloadBtn').onclick=()=>{
  if(!state.img) return alert("Upload image");

  const link=document.createElement('a');
  link.download="mic-frame.png";
  link.href=canvas.toDataURL();
  link.click();
};

// wait frame load
frame.onload = draw;

</script>

</body>
</html>
