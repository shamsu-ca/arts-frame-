<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MIC Frames</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overscroll-behavior: none; /* Prevents pull-to-refresh on mobile */
    }
    /* Prevent default touch actions on canvas to allow dragging */
    #canvasWrapper {
      touch-action: none; 
      cursor: grab;
    }
    #canvasWrapper:active {
      cursor: grabbing;
    }
    /* Custom Range Slider Styling */
    input[type=range] {
      accent-color: #000; 
    }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden text-slate-900">

  <!-- 1. Header -->
  <header class="bg-white px-4 py-3 border-b border-gray-200 flex justify-between items-center z-10 shrink-0">
    <h1 class="text-lg font-bold tracking-tight">MIC Frames</h1>
    <div class="text-[10px] font-mono text-gray-400">HD Export</div>
  </header>

  <!-- 2. Preview Box -->
  <div id="canvasWrapper" class="relative flex-grow bg-gray-200 flex items-center justify-center overflow-hidden p-4">
    <!-- 
      aspect-ratio ensures the canvas is NEVER stretched. 
      w-full and h-auto (or max-h-full) make it fit the screen.
    -->
    <canvas id="canvas" 
            class="max-w-full max-h-full shadow-xl bg-white"
            style="aspect-ratio: 1080 / 1950;">
    </canvas>
    
    <!-- Placeholder -->
    <div id="placeholderMsg" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-50 p-10 text-center">
      <p class="text-sm text-gray-500 font-medium">Tap Upload to Start</p>
    </div>
  </div>

  <!-- 3. Controls Panel -->
  <div class="bg-white border-t border-gray-200 p-4 pb-8 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] shrink-0 z-20 space-y-4">
    
    <!-- Row 1: Upload & Zoom -->
    <div class="flex items-center gap-3">
      <label class="shrink-0 cursor-pointer bg-black text-white h-10 px-4 rounded-full text-sm font-medium flex items-center gap-2 hover:bg-gray-800 transition active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload
        <input type="file" id="imageInput" accept="image/*" class="hidden">
      </label>
      
      <div class="flex-grow flex items-center gap-2">
        <span class="text-xs text-gray-400 font-medium w-8">Zoom</span>
        <input type="range" id="zoomRange" min="0.1" max="3" step="0.05" value="1" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
      </div>
    </div>

    <!-- Row 2: Name Input -->
    <div>
      <input type="text" id="nameInput" placeholder="enter name" maxlength="25"
        class="w-full text-center px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-lg font-bold focus:outline-none focus:ring-2 focus:ring-black/10 focus:border-black transition-all placeholder:text-gray-400">
    </div>

    <!-- Row 3: Text Position Slider -->
    <div class="flex items-center gap-3">
      <span class="text-xs font-bold w-16 text-gray-500">Text Y</span>
      <!-- Range adjusted to ensure text can reach bottom of 1950px canvas -->
      <input type="range" id="posRange" min="100" max="1850" step="10" value="1250" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer">
      <span id="posValue" class="text-xs font-mono text-gray-400 w-10 text-right">1250</span>
    </div>

    <!-- Row 4: Download Button -->
    <button id="downloadBtn" class="w-full bg-black text-white font-semibold py-3.5 rounded-xl shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
      Download
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  </div>

  <!-- Logic -->
  <script>
    /* --- SETTINGS --- */
    const SETTINGS = {
      canvasWidth: 1080,
      canvasHeight: 1950,
      textColor: '#000000',
      fontSize: 55,
      shadow: false,
      fontFamily: 'Inter, sans-serif'
    };

    // --- State ---
    let state = {
      img: null,
      x: 0,       // Pan X
      y: 0,       // Pan Y
      scale: 1,   // Zoom
      text: '',
      textPos: 1250 // Text Y Position
    };

    // --- FRAME IMAGE (Local File) ---
    const frameImg = new Image();
    // This loads frame.png from the SAME folder as this HTML file
    frameImg.src = 'frame.png'; 

    // --- DOM Elements ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasWrapper');
    const fileInput = document.getElementById('imageInput');
    const zoomRange = document.getElementById('zoomRange');
    const posRange = document.getElementById('posRange');
    const posValue = document.getElementById('posValue');
    const nameInput = document.getElementById('nameInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const placeholderMsg = document.getElementById('placeholderMsg');

    // --- Initialization ---
    function init() {
      // Set internal resolution (High Quality)
      canvas.width = SETTINGS.canvasWidth;
      canvas.height = SETTINGS.canvasHeight;
      
      // Redraw when frame loads
      frameImg.onload = draw;
      
      draw();
    }

    // --- Drawing Logic ---
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 1. Draw User Uploaded Photo (Bottom Layer)
      ctx.save();
      if (state.img) {
        ctx.translate(canvas.width / 2 + state.x, canvas.height / 2 + state.y);
        ctx.scale(state.scale, state.scale);
        ctx.drawImage(state.img, -state.img.width / 2, -state.img.height / 2);
      } else {
        // Placeholder background
        ctx.fillStyle = '#e2e8f0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      ctx.restore();

      // 2. Draw Frame Overlay (Middle Layer)
      if (frameImg.complete && frameImg.naturalHeight !== 0) {
         ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
      }

      // 3. Draw Text (Top Layer)
      if (state.text) {
        ctx.save();
        ctx.font = `bold ${SETTINGS.fontSize}px ${SETTINGS.fontFamily}`;
        ctx.textAlign = 'center';
        ctx.fillStyle = SETTINGS.textColor;
        if (SETTINGS.shadow) {
          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 20;
          ctx.shadowOffsetY = 5;
        }
        ctx.fillText(state.text, canvas.width / 2, state.textPos);
        ctx.restore();
      }
    }

    // --- Touch & Mouse Drag Logic ---
    let isDragging = false;
    let startX, startY;

    function getPointerPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrag(e) {
      if (!state.img) return;
      isDragging = true;
      const pos = getPointerPos(e);
      startX = pos.x;
      startY = pos.y;
    }

    function moveDrag(e) {
      if (!isDragging || !state.img) return;
      e.preventDefault(); 
      const pos = getPointerPos(e);
      const dx = pos.x - startX;
      const dy = pos.y - startY;

      // Convert screen pixels to canvas resolution pixels
      // The CSS ensures canvas is not stretched, so ratio calculation is accurate
      const scaleFactor = canvas.width / canvas.clientWidth;

      state.x += dx * scaleFactor;
      state.y += dy * scaleFactor;

      startX = pos.x;
      startY = pos.y;
      draw();
    }

    function endDrag() { isDragging = false; }

    canvas.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', endDrag);

    canvas.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('touchend', endDrag);

    // --- Event Listeners ---

    // 1. Upload & Auto Fit Logic
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (evt) => {
          const img = new Image();
          img.onload = () => {
            state.img = img;
            
            // Auto fit logic: Scale so image width matches canvas width
            const autoScale = canvas.width / img.width;
            state.scale = autoScale;
            
            // Update zoom slider to reflect the new auto scale
            zoomRange.value = autoScale;

            // Center the image
            state.x = 0;
            state.y = 0;

            placeholderMsg.style.display = 'none';
            draw();
          };
          img.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // 2. Zoom
    zoomRange.addEventListener('input', (e) => {
      state.scale = parseFloat(e.target.value);
      draw();
    });

    // 3. Name Input
    nameInput.addEventListener('input', (e) => {
      state.text = e.target.value;
      draw();
    });

    // 4. Text Position Slider
    posRange.addEventListener('input', (e) => {
      state.textPos = parseInt(e.target.value);
      posValue.textContent = state.textPos;
      draw();
    });

    // 5. Download
    downloadBtn.addEventListener('click', () => {
      if (!state.img) {
        alert('Please upload an image first');
        return;
      }
      
      // Name file based on input text, or default to 'frame'
      const filename = (state.text.trim() || 'frame') + '.png';
      
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Start
    init();
  </script>
</body>
</html>
